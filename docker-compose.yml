version: '3.8'

services:
  extractor:
    build: .
    command: uvicorn examples.extractor_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  job_manager:
    build: .
    command: uvicorn examples.job_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
